<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="작가 위래의 포트폴리오 — 장르 소설, SF, 판타지, 호러">
  <title>위래의 창고</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Header ───────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <a href="index.html" class="site-title">위래의 창고</a>
    <nav>
      <a href="index.html" class="current">소개</a>
      <a href="blog.html">기록</a>
    </nav>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────────────── -->
<main>

  <!-- About -->
  <section id="about">
    <div class="section-label">소개</div>
    <div class="about-content">
      <img
        class="about-photo"
        src="https://i.imgur.com/vUntOfE.jpg"
        alt="위래 프로필 사진"
        onerror="this.style.display='none'; document.getElementById('aboutFallback').style.display='flex';"
      >
      <div class="about-photo-fallback" id="aboutFallback">
        photo
      </div>
      <div class="about-text">
        <h2 class="about-name">위래</h2>
        <p class="about-bio">
          장르 소설 작가. 판타지, SF, 호러를 주로 쓴다. 2008년부터 활동을 시작해
          단편·중단편·경장편·웹소설·웹툰 원작 등 다양한 형식으로 작품을 발표해왔다.
          대표작으로는 웹소설 <em>슬기로운 문명생활</em>, 소설집 <em>백관의 왕이 이르니</em>,
          경장편 <em>허깨비 신이 돌아오도다</em> 등이 있다.
        </p>
      </div>
    </div>
  </section>

  <!-- History -->
  <section id="history">
    <div class="section-label">약력</div>
    <div class="history-tabs" id="historyTabs"></div>
    <div class="history-content" id="historyContent"></div>
  </section>

  <!-- Works -->
  <section id="works">
    <div class="section-label">작업</div>
    <div class="portfolio-layout">
      <aside class="sidebar">
        <div class="filter-buttons" id="filterButtons"></div>
      </aside>
      <div class="works-grid" id="worksGrid"></div>
    </div>
  </section>

</main>

<!-- ── Detail overlay ────────────────────────────────────── -->
<div class="detail-overlay" id="detailOverlay" role="dialog" aria-modal="true">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose" aria-label="닫기">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- ── Footer ────────────────────────────────────────────── -->
<footer>
  <p>© 위래의 창고</p>
</footer>

<script src="data/works.js"></script>
<script src="script.js"></script>
</body>
</html>
